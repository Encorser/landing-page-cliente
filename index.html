<!doctype html>
<html lang="es">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilmaVisión</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .btn-cyan {
      background: linear-gradient(145deg, #00bcd4, #00acc1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 2px 8px rgba(0,188,212,0.4);
      transition: all 0.2s;
    }
    .btn-cyan:hover { background: linear-gradient(145deg, #00d4e8, #00bcd4); }
    
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: zoom-pan 20s ease-in-out infinite;
      will-change: transform;
    }
    
    @keyframes zoom-pan {
      0%, 100% { transform: scale(1) translateX(0) translateY(0); }
      50% { transform: scale(1.1) translateX(2%) translateY(-2%); }
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="w-full min-h-screen">
  <header class="w-full sticky top-0 z-50 bg-black/95 backdrop-blur border-b border-cyan-500/20">
   <div class="w-full px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3"><button id="menu-toggle" class="p-2 hover:bg-cyan-900/30 rounded transition" aria-label="Menú" aria-expanded="false"> <i data-lucide="menu" class="text-cyan-400" style="width:24px;height:24px"></i> </button>
     <nav class="flex gap-6">
      <a href="#servicios" data-template-id="nav-servicios" class="canva-text hover:text-cyan-400 transition text-sm md:text-base"></a> <a href="#contacto" data-template-id="nav-contacto" class="canva-text hover:text-cyan-400 transition text-sm md:text-base"></a>
     </nav>
    </div>
    <div class="flex items-center gap-4">
     <button class="p-2 hover:bg-cyan-900/30 rounded transition" aria-label="Buscar"> <i data-lucide="search" class="text-cyan-400" style="width:20px;height:20px"></i> </button> <button data-template-id="nav-newsletter" class="hidden sm:inline-block px-4 py-2 text-sm rounded-lg border border-cyan-500/40 hover:border-cyan-400 hover:bg-cyan-900/20 transition font-medium"></button> <button data-template-id="nav-subscribe" class="hidden sm:inline-block px-4 py-2 text-sm rounded-lg btn-cyan font-medium"></button>
    </div>
   </div>
  </header>
  <main>
   <section id="hero-section" class="w-full relative text-center px-6 py-20 overflow-hidden" style="min-height:calc(85 * min(var(--vh, 1vh), 1vh))"><img data-template-id="hero-background" class="canva-image hero-bg" loading="lazy">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#0f172a]"></div>
    <div class="relative z-10 flex flex-col items-center justify-center h-full">
     <img data-template-id="hero-logo-large" class="canva-image w-80 h-80 md:w-96 md:h-96 object-contain mb-4 rounded-full border-4 border-cyan-400/60 shadow-lg shadow-cyan-500/40" loading="lazy">
     <div class="w-96 h-1 mx-auto mb-4 bg-cyan-400"></div>
     <h1 data-template-id="hero-title" class="canva-text leading-tight max-w-3xl"></h1>
     <div class="w-96 h-1 mx-auto my-4 bg-cyan-400"></div>
     <p data-template-id="hero-subtitle" class="canva-text mt-3 leading-relaxed max-w-2xl text-lg md:text-2xl"></p>
     <p data-template-id="hero-description" class="canva-text mt-4 leading-relaxed max-w-2xl text-base"></p><a href="#contacto" data-template-id="hero-cta" class="canva-button inline-block mt-6 px-10 py-4 rounded-lg font-bold text-xl btn-cyan no-underline"></a>
    </div>
   </section>
   <section id="servicios" data-template-id="services-section" class="canva-section w-full py-20">
    <div class="max-w-6xl mx-auto px-6">
     <h2 data-template-id="services-title" class="canva-text text-center mb-14"></h2>
     <div class="grid md:grid-cols-3 gap-8">
      <div data-template-id="service-1-card" class="canva-card p-7 rounded-xl text-center border border-gray-700">
       <div class="w-14 h-14 mx-auto mb-4 bg-cyan-900/40 rounded-full flex items-center justify-center"><i data-lucide="video" class="text-cyan-400" style="width:28px;height:28px"></i>
       </div>
       <h3 data-template-id="service-1-title" class="canva-text font-semibold mb-3"></h3>
       <div class="w-8 h-1 mx-auto mb-4" data-template-id="service-1-divider"></div>
       <p data-template-id="service-1-desc" class="canva-text leading-relaxed"></p>
      </div>
      <div data-template-id="service-2-card" class="canva-card p-7 rounded-xl text-center border border-gray-700">
       <div class="w-14 h-14 mx-auto mb-4 bg-cyan-900/40 rounded-full flex items-center justify-center"><i data-lucide="clapperboard" class="text-cyan-400" style="width:28px;height:28px"></i>
       </div>
       <h3 data-template-id="service-2-title" class="canva-text font-semibold mb-3"></h3>
       <div class="w-8 h-1 mx-auto mb-4" data-template-id="service-2-divider"></div>
       <p data-template-id="service-2-desc" class="canva-text leading-relaxed"></p>
      </div>
      <div data-template-id="service-3-card" class="canva-card p-7 rounded-xl text-center border border-gray-700">
       <div class="w-14 h-14 mx-auto mb-4 bg-cyan-900/40 rounded-full flex items-center justify-center"><i data-lucide="image" class="text-cyan-400" style="width:28px;height:28px"></i>
       </div>
       <h3 data-template-id="service-3-title" class="canva-text font-semibold mb-3"></h3>
       <div class="w-8 h-1 mx-auto mb-4" data-template-id="service-3-divider"></div>
       <p data-template-id="service-3-desc" class="canva-text leading-relaxed"></p>
      </div>
     </div>
    </div>
   </section>
   <section id="contacto" data-template-id="contact-section" class="canva-section w-full py-20">
    <div class="max-w-3xl mx-auto px-6 text-center">
     <h2 data-template-id="contact-title" class="canva-text mb-4"></h2>
     <div class="w-12 h-1 mx-auto mb-10" data-template-id="contact-title-divider"></div>
     <p data-template-id="contact-description" class="canva-text mb-10 leading-relaxed"></p>
     <div class="grid sm:grid-cols-3 gap-8">
      <div class="flex flex-col items-center gap-3">
       <div class="w-12 h-12 bg-cyan-900/40 rounded-full flex items-center justify-center"><i data-lucide="mail" class="text-cyan-400" style="width:22px;height:22px"></i>
       </div>
       <p data-template-id="contact-email" class="canva-text text-sm"></p>
      </div>
      <div class="flex flex-col items-center gap-3">
       <div class="w-12 h-12 bg-cyan-900/40 rounded-full flex items-center justify-center"><i data-lucide="phone" class="text-cyan-400" style="width:22px;height:22px"></i>
       </div>
       <p data-template-id="contact-phone" class="canva-text text-sm"></p>
      </div>
      <div class="flex flex-col items-center gap-3">
       <a href="https://www.facebook.com/FilmaVisionOficial/" target="_blank" rel="noopener noreferrer" class="w-12 h-12 bg-cyan-900/40 rounded-full flex items-center justify-center hover:bg-cyan-800/60 transition"><i data-lucide="facebook" class="text-cyan-400" style="width:22px;height:22px"></i></a>
       <p data-template-id="contact-facebook" class="canva-text text-sm"></p>
      </div>
     </div>
     <p data-template-id="contact-location" class="canva-text mt-10"></p><a href="#contacto" data-template-id="contact-cta" class="canva-button inline-block mt-6 px-8 py-3 rounded-lg font-semibold btn-cyan no-underline"></a>
    </div>
   </section>
  </main>
  <footer data-template-id="footer-section" class="canva-footer w-full py-8 border-t border-gray-800">
   <div class="max-w-6xl mx-auto px-6 text-center">
    <p data-template-id="footer-copy" class="canva-text text-xs opacity-70"></p>
   </div>
  </footer>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    lucide.createIcons();
    
    // Mobile menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    menuToggle.addEventListener('click', () => {
      const expanded = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', String(!expanded));
    });
    
    const hero = document.getElementById('hero-section');
    window.addEventListener('scroll', () => {
      const rect = hero.getBoundingClientRect();
      const startFade = rect.height * 0.3;
      const progress = Math.min(1, Math.max(0, (-rect.top - startFade) / (rect.height * 0.6)));
      hero.style.opacity = 1 - progress;
    });
  </script>
